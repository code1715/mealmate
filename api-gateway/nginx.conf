# Rate-limit zone for login endpoint (10 requests per IP per second, burst 5)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/s;

upstream order_backend {
    server order-service-1:8000 max_fails=1 fail_timeout=5s;
    server order-service-2:8000 max_fails=1 fail_timeout=5s;
}

server {
    listen 80;

    # Docker DNS resolver for services that might not be running at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Shared proxy headers for all routes.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;

    # --- Auth Service ---
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        set $target http://auth:8000;
        proxy_pass $target;
    }

    location /api/auth/ {
        set $target http://auth:8000;
        proxy_pass $target;
    }

    # --- Order Service (load-balanced) ---
    location /api/orders {
        proxy_pass http://order_backend;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 3s;
        proxy_next_upstream_tries 2;
    }

    # --- Restaurant Service ---
    location /api/restaurants {
        set $target http://restaurant:8000;
        proxy_pass $target;
    }

    # --- Routing Service ---
    location /api/routing {
        set $target http://routing:8000;
        proxy_pass $target;
    }

    # --- Per-service health ---
    location /health/auth {
        set $target http://auth:8000;
        proxy_pass $target/health;
    }
    location /health/order {
        proxy_pass http://order_backend/health;
    }
    location /health/restaurant {
        set $target http://restaurant:8000;
        proxy_pass $target/health;
    }
    location /health/routing {
        set $target http://routing:8000;
        proxy_pass $target/health;
    }
    location /health/notification {
        set $target http://notification:8000;
        proxy_pass $target/health;
    }

    # --- Gateway health ---
    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"api-gateway"}';
    }

    # --- Catch-all ---
    location / {
        default_type application/json;
        return 404 '{"detail":"Not found"}';
    }
}
