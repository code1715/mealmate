upstream order_backend {
    # Round-robin — distributes requests across both instances.
    # max_fails=1: mark server as unavailable after 1 failed attempt
    # fail_timeout=5s: retry the server after 5 seconds
    server order:8000 max_fails=1 fail_timeout=5s;
    server order-2:8000 max_fails=1 fail_timeout=5s;
}

server {
    listen 80;

    # Use Docker's embedded DNS resolver for services that might not
    # be running at startup (restaurant, routing, notification).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Auth Service ---
    location /api/auth/ {
        set $target http://auth:8000;
        proxy_pass $target;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Order Service (load-balanced across 2 instances) ---
    location /api/orders {
        proxy_pass http://order_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;

        # If the chosen instance fails, retry another one.
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 3s;
        proxy_next_upstream_tries 2;
    }

    # --- Restaurant Service ---
    location /api/restaurants {
        set $target http://restaurant:8000;
        proxy_pass $target;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Routing Service ---
    location /api/routing {
        set $target http://routing:8000;
        proxy_pass $target;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Per-service health checks ---
    location /health/auth {
        set $target http://auth:8000;
        proxy_pass $target/health;
    }
    location /health/order {
        proxy_pass http://order_backend/health;
    }
    location /health/restaurant {
        set $target http://restaurant:8000;
        proxy_pass $target/health;
    }
    location /health/routing {
        set $target http://routing:8000;
        proxy_pass $target/health;
    }
    location /health/notification {
        set $target http://notification:8000;
        proxy_pass $target/health;
    }

    # --- Gateway health ---
    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"api-gateway"}';
    }
}
