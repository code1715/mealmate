services:
  postgres-auth:
    image: postgres:18.3
    environment:
      POSTGRES_USER: mealmate
      POSTGRES_PASSWORD: mealmate
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealmate -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-orders:
    image: postgres:18.3
    environment:
      POSTGRES_USER: mealmate
      POSTGRES_PASSWORD: mealmate
      POSTGRES_DB: orders
    ports:
      - "5433:5432"
    volumes:
      - postgres_orders_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealmate -d orders"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo1:
    image: mongo:8.3.1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo2:
    image: mongo:8.3.1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo3:
    image: mongo:8.3.1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:8.3.1
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./docker/mongo-init.sh:/mongo-init.sh:ro
    entrypoint: ["bash", "/mongo-init.sh"]

  mongo-seed:
    image: mongo:8.3.1
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    restart: "no"
    volumes:
      - ./docker/mongo-seed.sh:/mongo-seed.sh:ro
    entrypoint: ["bash", "/mongo-seed.sh"]

  redis:
    image: redis:8.6.3
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.8
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.7.8
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./docker/kafka-init.sh:/kafka-init.sh:ro
    entrypoint: ["bash", "/kafka-init.sh"]

  neo4j:
    image: neo4j:5.26.25
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/mealmate
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  neo4j-seed:
    image: neo4j:5.26.25
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./docker/neo4j-seed.sh:/neo4j-seed.sh:ro
      - ./scripts/init_graph.cypher:/init_graph.cypher:ro
      - ./scripts/seed_graph.cypher:/seed_graph.cypher:ro
    entrypoint: ["bash", "/neo4j-seed.sh"]
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: mealmate

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    environment:
      POSTGRES_URL: postgresql+asyncpg://mealmate:mealmate@postgres-auth:5432/auth
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  order-service-1:
    container_name: order-service-1
    build:
      context: .
      dockerfile: docker/Dockerfile.order
    environment:
      POSTGRES_URL: postgresql+asyncpg://mealmate:mealmate@postgres-orders:5432/orders
      REDIS_URL: redis://redis:6379/0
      SERVICE_INSTANCE: order-service-1
      ROUTING_SERVICE_URL: http://routing:8000
    depends_on:
      postgres-orders:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  order-service-2:
    container_name: order-service-2
    build:
      context: .
      dockerfile: docker/Dockerfile.order
    environment:
      POSTGRES_URL: postgresql+asyncpg://mealmate:mealmate@postgres-orders:5432/orders
      REDIS_URL: redis://redis:6379/0
      SERVICE_INSTANCE: order-service-2
      ROUTING_SERVICE_URL: http://routing:8000
    depends_on:
      postgres-orders:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      order-service-1:
        condition: service_healthy
      order-service-2:
        condition: service_healthy
      restaurant:
        condition: service_healthy
      routing:
        condition: service_healthy
      notification:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  restaurant:
    build:
      context: .
      dockerfile: docker/Dockerfile.restaurant
    depends_on:
      mongo1:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  routing:
    build:
      context: .
      dockerfile: docker/Dockerfile.routing
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: mealmate
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notification:
    build:
      context: .
      dockerfile: docker/Dockerfile.notification
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - notification_logs:/app/logs
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_auth_data:
  postgres_orders_data:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  neo4j_data:
  notification_logs:
